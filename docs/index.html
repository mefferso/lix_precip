<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin: 0; background: #ececec; color: #111; }
    main { max-width: 1500px; margin: 0 auto; padding: 18px; }
    h1 { margin: 0 0 10px; font-size: 28px; }
    p { margin: 0 0 14px; font-size: 15px; }
    .card { background: #fff; border: 2px solid #111; border-radius: 10px; padding: 12px; }
    img { width: 100%; height: auto; display: block; }
    .links { margin-top: 12px; font-size: 15px; }
    a { color: #0b57d0; }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <img src="lix_24h_precip_latest.png" alt="Latest WFO LIX 24-hour precipitation map">
      <div class="links">
        <a href="station_precip_latest.csv">Download latest station CSV</a>
        &nbsp;|&nbsp;
        <a href="latest.json">Latest metadata JSON</a>
      </div>
    </div>
  </main>
</body>
</html>
