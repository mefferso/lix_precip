<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WFO LIX Precipitation and Station Maps</title>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      background: #ececec;
      color: #111;
    }

    main {
      max-width: 1500px;
      margin: 0 auto;
      padding: 18px;
    }

    .card {
      background: #fff;
      border: 2px solid #111;
      border-radius: 10px;
      padding: 12px;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: end;
      gap: 14px;
      margin-bottom: 10px;
    }

    .title-wrap h1 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    .title-wrap p {
      margin: 0;
      font-size: 15px;
    }

    .controls label {
      font-weight: bold;
      display: block;
      margin-bottom: 4px;
    }

    select {
      padding: 8px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
      min-width: 260px;
    }

    .button-link {
      display: inline-block;
      padding: 10px 14px;
      border: 2px solid #111;
      border-radius: 8px;
      background: #f5f5f5;
      color: #111;
      text-decoration: none;
      font-weight: bold;
      white-space: nowrap;
    }

    .button-link:hover {
      background: #e9e9e9;
    }

    img {
      width: 100%;
      height: auto;
      display: block;
      margin-top: 15px;
      border: 1px solid #ccc;
      background: #f7f7f7;
    }

    .links {
      margin-top: 14px;
      font-size: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .links-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    a {
      color: #0b57d0;
    }

    @media (max-width: 900px) {
      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .links {
        flex-direction: column;
        align-items: flex-start;
      }

      .links-group {
        width: 100%;
      }

      select {
        width: 100%;
        min-width: 0;
      }
    }
  </style>
</head>

<body>
  <main>
    <div class="card">
      <div class="topbar">
        <div class="title-wrap">
          <h1>WFO LIX Precipitation Maps</h1>
          <p>Stage IV / NWPS rainfall maps and station observation products for the WFO LIX area.</p>
        </div>

        <div class="controls">
          <label for="mapSelector">Select Rainfall Map:</label>

          <select id="mapSelector">
            <option value="lix_24h_precip_latest.png">24 Hour Rainfall</option>
            <option value="lix_2d_precip_latest.png">2-Day Rainfall</option>
            <option value="lix_3d_precip_latest.png">3-Day Rainfall</option>
            <option value="lix_4d_precip_latest.png">4-Day Rainfall</option>
            <option value="lix_5d_precip_latest.png">5-Day Rainfall</option>
            <option value="lix_6d_precip_latest.png">6-Day Rainfall</option>
            <option value="lix_7d_precip_latest.png">7-Day Rainfall</option>
            <option value="lix_10d_precip_latest.png">10-Day Rainfall</option>
            <option value="lix_14d_precip_latest.png">14-Day Rainfall</option>
            <option value="lix_30d_precip_latest.png">30-Day Rainfall</option>
            <option value="lix_mtd_precip_latest.png">Month-to-Date Rainfall</option>
            <option value="lix_ytd_precip_latest.png">Year-to-Date Rainfall</option>
          </select>
        </div>

        <div>
          <a class="button-link" href="station_maps.html">View Station Observation Maps</a>
        </div>
      </div>

      <img
        id="precipMap"
        src="lix_24h_precip_latest.png"
        alt="WFO LIX precipitation map"
      >

      <div class="links">
        <div class="links-group">
          <a href="station_precip_24h_latest.csv">Station 24h Rainfall CSV</a>
          <span>|</span>
          <a href="latest.json">Latest Metadata JSON</a>
        </div>

        <div class="links-group">
          <a href="lix_station_precip_24h_latest.png">24h Station Rainfall PNG</a>
          <span>|</span>
          <a href="lix_station_air_temp_latest.png">Current Temp PNG</a>
          <span>|</span>
          <a href="lix_station_air_temp_daily_min_latest.png">Daily Low PNG</a>
          <span>|</span>
          <a href="lix_station_air_temp_daily_max_latest.png">Daily High PNG</a>
          <span>|</span>
          <a href="obs_qc.html">Station QC Helper</a>
        </div>
      </div>
    </div>
  </main>

  <script>
    const selector = document.getElementById('mapSelector');
    const mapImage = document.getElementById('precipMap');

    selector.addEventListener('change', function () {
      mapImage.src = this.value;

      // Bust browser cache so the damn thing updates immediately
      mapImage.src = this.value + '?t=' + Date.now();
    });
  </script>
</body>
</html>
