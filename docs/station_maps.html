<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WFO LIX Station Observation Maps</title>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      background: #ececec;
      color: #111;
    }

    main {
      max-width: 1500px;
      margin: 0 auto;
      padding: 18px;
    }

    .card {
      background: #fff;
      border: 2px solid #111;
      border-radius: 10px;
      padding: 12px;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: end;
      gap: 14px;
      margin-bottom: 10px;
    }

    .title-wrap h1 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    .title-wrap p {
      margin: 0;
      font-size: 15px;
    }

    .controls label {
      font-weight: bold;
      display: block;
      margin-bottom: 4px;
    }

    select {
      padding: 8px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
      min-width: 260px;
    }

    .button-link {
      display: inline-block;
      padding: 10px 14px;
      border: 2px solid #111;
      border-radius: 8px;
      background: #f5f5f5;
      color: #111;
      text-decoration: none;
      font-weight: bold;
      white-space: nowrap;
    }

    .button-link:hover {
      background: #e9e9e9;
    }

    img {
      width: 100%;
      height: auto;
      display: block;
      margin-top: 15px;
      border: 1px solid #ccc;
      background: #f7f7f7;
    }

    .status-box {
      display: none;
      margin-top: 15px;
      padding: 14px 16px;
      border: 1px solid #b3261e;
      background: #fde8e7;
      color: #8c1d18;
      font-size: 16px;
      font-weight: bold;
      border-radius: 6px;
    }

    .links {
      margin-top: 12px;
      font-size: 15px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    a {
      color: #0b57d0;
    }

    @media (max-width: 900px) {
      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      select {
        width: 100%;
        min-width: 0;
      }

      .links {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>
  <main>
    <div class="card">
      <div class="topbar">
        <div class="title-wrap">
          <h1>WFO LIX Station Observation Maps</h1>
          <p>Interpolated surface observations for the WFO LIX area.</p>
        </div>

        <div class="controls">
          <label for="mapSelector">Select Dataset:</label>
          <select id="mapSelector"></select>
        </div>

        <div class="controls">
          <label for="regionSelector">Select Region:</label>
          <select id="regionSelector"></select>
        </div>

        <div>
          <a class="button-link" href="index.html">Back to NWPS Precip Maps</a>
        </div>
      </div>

      <img
        id="stationMap"
        alt="WFO LIX station observation map"
        style="display:none;"
      >

      <div id="mapStatus" class="status-box"></div>

      <div class="links">
        <div>
          <a href="obs_qc.html">Station QC helper</a>
        </div>
      </div>
    </div>
  </main>

  <script>
    const DATASET_META = {
      precip_24h: {
        label: "24 Hour Rainfall"
      },
      air_temp_latest: {
        label: "Current Temperature"
      },
      air_temp_daily_min: {
        label: "24 Hour Low Temperature"
      },
      air_temp_daily_max: {
        label: "24 Hour High Temperature"
      }
    };

    const DATASET_ORDER = [
      "precip_24h",
      "air_temp_latest",
      "air_temp_daily_min",
      "air_temp_daily_max"
    ];

    const REGION_META = {
      full: {
        label: "Full LIX Area"
      },
      baton_rouge_metro: {
        label: "Baton Rouge Metro"
      },
      new_orleans_metro: {
        label: "New Orleans Metro"
      },
      southwest_ms: {
        label: "Southwest MS"
      },
      coastal_ms: {
        label: "Coastal MS"
      },
      northshore: {
        label: "Northshore of Lake Pontchartrain"
      }
    };

    const REGION_ORDER = [
      "full",
      "baton_rouge_metro",
      "new_orleans_metro",
      "southwest_ms",
      "coastal_ms",
      "northshore"
    ];

    const selector = document.getElementById("mapSelector");
    const regionSelector = document.getElementById("regionSelector");
    const mapImage = document.getElementById("stationMap");
    const mapStatus = document.getElementById("mapStatus");

    let manifestData = null;

    function showStatus(message) {
      mapImage.style.display = "none";
      mapImage.removeAttribute("src");
      mapStatus.textContent = message;
      mapStatus.style.display = "block";
    }

    function showImage(filename) {
      mapStatus.style.display = "none";
      mapStatus.textContent = "";
      mapImage.src = filename + "?t=" + Date.now();
      mapImage.style.display = "block";
    }

    function renderSelectedDataset() {
      if (!manifestData || !manifestData.maps) {
        showStatus("Map manifest missing or invalid.");
        return;
      }

      const datasetKey = selector.value;
      const regionKey = regionSelector.value;
      const mapInfo = manifestData.maps[datasetKey];

      if (!mapInfo) {
        showStatus("Selected dataset not found in manifest.");
        return;
      }

      let imageName = null;

      if (mapInfo.regions && mapInfo.regions[regionKey]) {
        imageName = mapInfo.regions[regionKey];
      } else if (regionKey === "full" && mapInfo.image) {
        imageName = mapInfo.image;
      }

      if (!imageName) {
        showStatus(mapInfo.status || "Selected regional map unavailable.");
        return;
      }

      showImage(imageName);
    }

    function populateDatasetSelector() {
      selector.innerHTML = "";

      for (const key of DATASET_ORDER) {
        const option = document.createElement("option");
        option.value = key;
        option.textContent = DATASET_META[key]?.label || key;
        selector.appendChild(option);
      }
    }

    function populateRegionSelector() {
      regionSelector.innerHTML = "";

      for (const key of REGION_ORDER) {
        const option = document.createElement("option");
        option.value = key;
        option.textContent = REGION_META[key]?.label || key;
        regionSelector.appendChild(option);
      }
    }

    async function initPage() {
      populateDatasetSelector();
      populateRegionSelector();

      try {
        const response = await fetch("latest_station_maps.json?t=" + Date.now(), {
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error("Failed to load latest_station_maps.json");
        }

        manifestData = await response.json();
        renderSelectedDataset();
      } catch (err) {
        console.error(err);
        showStatus("Could not load station map manifest.");
      }
    }

    selector.addEventListener("change", renderSelectedDataset);
    regionSelector.addEventListener("change", renderSelectedDataset);

    initPage();
  </script>
</body>
</html>
