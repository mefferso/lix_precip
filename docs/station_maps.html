<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WFO LIX Station Observation Maps</title>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      background: #ececec;
      color: #111;
    }

    main {
      max-width: 1500px;
      margin: 0 auto;
      padding: 18px;
    }

    .card {
      background: #fff;
      border: 2px solid #111;
      border-radius: 10px;
      padding: 12px;
    }

    .button-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: end;
      gap: 14px;
      margin-bottom: 10px;
    }

    .title-wrap h1 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    .controls label {
      font-weight: bold;
      display: block;
      margin-bottom: 4px;
    }

    select,
    input[type="date"] {
      padding: 8px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
      min-width: 220px;
      box-sizing: border-box;
    }

    input[type="date"]:disabled {
      background: #eeeeee;
      color: #666666;
      cursor: not-allowed;
    }

    .hint-text {
      margin-top: 4px;
      font-size: 12px;
      color: #555;
      max-width: 260px;
    }

    .button-link {
      display: inline-block;
      padding: 10px 14px;
      border: 2px solid #111;
      border-radius: 8px;
      background: #f5f5f5;
      color: #111;
      text-decoration: none;
      font-weight: bold;
      white-space: nowrap;
    }

    .button-link:hover {
      background: #e9e9e9;
    }

    img {
      width: 100%;
      height: auto;
      display: block;
      margin-top: 15px;
      border: 1px solid #ccc;
      background: #f7f7f7;
    }

    .status-box {
      display: none;
      margin-top: 15px;
      padding: 14px 16px;
      border: 1px solid #b3261e;
      background: #fde8e7;
      color: #8c1d18;
      font-size: 16px;
      font-weight: bold;
      border-radius: 6px;
    }

    .links {
      margin-top: 12px;
      font-size: 15px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    a {
      color: #0b57d0;
    }

    @media (max-width: 900px) {
      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      select,
      input[type="date"] {
        width: 100%;
        min-width: 0;
      }

      .button-group {
        justify-content: flex-start;
      }

      .links {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>
  <main>
    <div class="card">
      <div class="topbar">
        <div class="title-wrap">
          <h1>WFO LIX Station Observation Maps</h1>
        </div>

        <div class="controls">
          <label for="mapSelector">Select Dataset:</label>
          <select id="mapSelector"></select>
        </div>

        <div class="controls">
          <label for="regionSelector">Select Region:</label>
          <select id="regionSelector"></select>
        </div>

        <div class="controls">
          <label for="dateSelector">Select Archive Date:</label>
          <input id="dateSelector" type="date">
          <div id="dateHint" class="hint-text"></div>
        </div>

        <div class="button-group">
          <a id="downloadPngLink" class="button-link" href="#" download>Download PNG</a>
          <a class="button-link" href="index.html">Back to NWPS Precip Maps</a>
        </div>
      </div>

      <img
        id="stationMap"
        alt="WFO LIX station observation map"
        style="display:none;"
      >

      <div id="mapStatus" class="status-box"></div>

      <div class="links">
        <div>
          <a href="obs_qc.html">Station QC helper</a>
        </div>
      </div>
    </div>
  </main>

  <script>
    const DATASET_META = {
      precip_24h: {
        label: "24 Hour Rainfall",
        archived: true
      },
      air_temp_latest: {
        label: "Current Temperatures",
        archived: false
      },
      air_temp_daily_min: {
        label: "24 Hour Low Temperatures",
        archived: true
      },
      air_temp_daily_max: {
        label: "24 Hour High Temperatures",
        archived: true
      }
    };

    const DATASET_ORDER = [
      "precip_24h",
      "air_temp_latest",
      "air_temp_daily_min",
      "air_temp_daily_max"
    ];

    const REGION_META = {
      full: { label: "Full LIX Area" },
      baton_rouge_metro: { label: "Baton Rouge Metro" },
      new_orleans_metro: { label: "New Orleans Metro" },
      southwest_ms: { label: "Southwest MS" },
      coastal_ms: { label: "Coastal MS" },
      northshore: { label: "Northshore of Lake Pontchartrain" }
    };

    const REGION_ORDER = [
      "full",
      "baton_rouge_metro",
      "new_orleans_metro",
      "southwest_ms",
      "coastal_ms",
      "northshore"
    ];

    const selector = document.getElementById("mapSelector");
    const regionSelector = document.getElementById("regionSelector");
    const dateSelector = document.getElementById("dateSelector");
    const dateHint = document.getElementById("dateHint");
    const mapImage = document.getElementById("stationMap");
    const mapStatus = document.getElementById("mapStatus");
    const downloadPngLink = document.getElementById("downloadPngLink");

    let latestManifestData = null;
    let archiveManifestData = null;
    let availableArchiveDates = [];

    function showStatus(message) {
      mapImage.style.display = "none";
      mapImage.removeAttribute("src");
      downloadPngLink.href = "#";
      downloadPngLink.removeAttribute("download");
      mapStatus.textContent = message;
      mapStatus.style.display = "block";
    }

    function showImage(filename) {
      mapStatus.style.display = "none";
      mapStatus.textContent = "";

      downloadPngLink.href = filename;
      downloadPngLink.download = filename.split("/").pop() || "station_map.png";

      mapImage.onerror = function () {
        showStatus("Could not load map image: " + filename);
      };

      mapImage.onload = function () {
        mapStatus.style.display = "none";
        mapStatus.textContent = "";
        mapImage.style.display = "block";
      };

      mapImage.src = filename + "?t=" + Date.now();
    }

    function datasetUsesArchive(datasetKey) {
      return DATASET_META[datasetKey]?.archived === true;
    }

    function updateDateControlState() {
      const datasetKey = selector.value;
      const usesArchive = datasetUsesArchive(datasetKey);

      dateSelector.disabled = !usesArchive;

      if (!usesArchive) {
        dateHint.textContent = "Current Temperatures are latest-only.";
        return;
      }

      if (!availableArchiveDates.length) {
        dateHint.textContent = "No archived dates available yet.";
        return;
      }

      dateHint.textContent = "Archived daily maps available.";
    }

    function setDateBoundsAndDefault() {
      if (!availableArchiveDates.length) {
        dateSelector.value = "";
        dateSelector.removeAttribute("min");
        dateSelector.removeAttribute("max");
        return;
      }

      const firstDate = availableArchiveDates[0];
      const lastDate = availableArchiveDates[availableArchiveDates.length - 1];

      dateSelector.min = firstDate;
      dateSelector.max = lastDate;

      if (!dateSelector.value || !availableArchiveDates.includes(dateSelector.value)) {
        dateSelector.value = lastDate;
      }
    }

    function getLatestImage(datasetKey, regionKey) {
      if (!latestManifestData || !latestManifestData.maps) {
        return null;
      }

      const mapInfo = latestManifestData.maps[datasetKey];
      if (!mapInfo) {
        return null;
      }

      if (mapInfo.regions && mapInfo.regions[regionKey]) {
        return mapInfo.regions[regionKey];
      }

      if (regionKey === "full" && mapInfo.image) {
        return mapInfo.image;
      }

      return null;
    }

    function getArchiveImage(datasetKey, regionKey, dateKey) {
      if (!archiveManifestData || !archiveManifestData.dates) {
        return null;
      }

      const dateInfo = archiveManifestData.dates[dateKey];
      if (!dateInfo) {
        return null;
      }

      const datasetInfo = dateInfo[datasetKey];
      if (!datasetInfo) {
        return null;
      }

      return datasetInfo[regionKey] || null;
    }

    function renderSelectedDataset() {
      const datasetKey = selector.value;
      const regionKey = regionSelector.value;
      const usesArchive = datasetUsesArchive(datasetKey);

      updateDateControlState();

      let imageName = null;

      if (usesArchive) {
        const dateKey = dateSelector.value;

        if (!dateKey) {
          showStatus("No archive date selected.");
          return;
        }

        if (!availableArchiveDates.includes(dateKey)) {
          showStatus("No archived station map is available for " + dateKey + ".");
          return;
        }

        imageName = getArchiveImage(datasetKey, regionKey, dateKey);

        if (!imageName) {
          showStatus("No archived " + (DATASET_META[datasetKey]?.label || datasetKey) + " map is available for " + dateKey + " / " + (REGION_META[regionKey]?.label || regionKey) + ".");
          return;
        }
      } else {
        imageName = getLatestImage(datasetKey, regionKey);

        if (!imageName) {
          showStatus("Latest regional map unavailable.");
          return;
        }
      }

      showImage(imageName);
    }

    function populateDatasetSelector() {
      selector.innerHTML = "";

      for (const key of DATASET_ORDER) {
        const option = document.createElement("option");
        option.value = key;
        option.textContent = DATASET_META[key]?.label || key;
        selector.appendChild(option);
      }
    }

    function populateRegionSelector() {
      regionSelector.innerHTML = "";

      for (const key of REGION_ORDER) {
        const option = document.createElement("option");
        option.value = key;
        option.textContent = REGION_META[key]?.label || key;
        regionSelector.appendChild(option);
      }
    }

    async function fetchJsonOrNull(url) {
      try {
        const response = await fetch(url + "?t=" + Date.now(), { cache: "no-store" });
        if (!response.ok) {
          return null;
        }
        return await response.json();
      } catch (err) {
        console.warn("Could not load", url, err);
        return null;
      }
    }

    async function initPage() {
      populateDatasetSelector();
      populateRegionSelector();

      latestManifestData = await fetchJsonOrNull("latest_station_maps.json");
      archiveManifestData = await fetchJsonOrNull("archive/station/station_manifest.json");

      if (archiveManifestData && archiveManifestData.dates) {
        availableArchiveDates = Object.keys(archiveManifestData.dates).sort();
      }

      setDateBoundsAndDefault();
      updateDateControlState();

      if (!latestManifestData && !archiveManifestData) {
        showStatus("Could not load station map manifests.");
        return;
      }

      renderSelectedDataset();
    }

    selector.addEventListener("change", function () {
      updateDateControlState();
      renderSelectedDataset();
    });

    regionSelector.addEventListener("change", renderSelectedDataset);
    dateSelector.addEventListener("change", renderSelectedDataset);

    initPage();
  </script>
</body>
</html>
