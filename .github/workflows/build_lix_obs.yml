name: Build LIX station observations

on:
  push:
    paths:
      - 'scripts/fetch_lix_obs.py'
      - '.github/workflows/build_lix_obs.yml'
      - 'docs/index.html'
      - 'requirements.txt'
  workflow_dispatch:
    inputs:
      end_time_utc:
        description: 'Optional end time in YYYYMMDDHHMM UTC format. Leave blank for now.'
        required: false
        default: ''
  schedule:
    - cron: '8 * * * *'

permissions:
  contents: write

concurrency:
  group: lix-station-obs
  cancel-in-progress: true

jobs:
  build-obs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build station products
        env:
          SYNOPTIC_TOKEN: ${{ secrets.SYNOPTIC_TOKEN }}
          END_TIME_UTC: ${{ github.event.inputs.end_time_utc }}
        run: |
          if [ -n "$END_TIME_UTC" ]; then
            python scripts/fetch_lix_obs.py "$END_TIME_UTC"
          else
            python scripts/fetch_lix_obs.py
          fi

      - name: Commit updated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update LIX station observations"
          git pull --rebase origin main
          git push origin main
