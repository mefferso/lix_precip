name: Build WFO LIX 24-hour precipitation map

on:
  push:
    paths:
      - 'scripts/fetch_lix_precip.py'
  workflow_dispatch:
    inputs:
      map_date:
        description: 'Map date in MM/DD/YYYY format (example: 04/18/2026). Leave blank for latest available cycle.'
        required: false
        default: ''
  schedule:
    - cron: '45 14 * * *'

permissions:
  contents: write

concurrency:
  group: lix-precip-map
  cancel-in-progress: true

jobs:
  build-map:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build date argument
        id: build_date
        shell: bash
        env:
          INPUT_DATE: ${{ github.event.inputs.map_date }}
        run: |
          if [ -z "$INPUT_DATE" ]; then
            echo "date_arg=" >> "$GITHUB_OUTPUT"
            echo "No manual date provided. Script will use default latest cycle."
          else
            DATE_ARG="$(date -u -d "$INPUT_DATE" +%Y%m%d)1200"
            echo "date_arg=$DATE_ARG" >> "$GITHUB_OUTPUT"
            echo "Using manual date: $INPUT_DATE -> $DATE_ARG"
          fi

      - name: Generate map
        run: |
          if [ -n "${{ steps.build_date.outputs.date_arg }}" ]; then
            python scripts/fetch_lix_precip.py "${{ steps.build_date.outputs.date_arg }}"
          else
            python scripts/fetch_lix_precip.py
          fi

      - name: Commit updated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/ data/

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update latest LIX precip map"

          git pull --rebase origin main
          git push origin main
