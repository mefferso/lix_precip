name: Build WFO LIX 24-hour precipitation map

on:
  workflow_dispatch:
  schedule:
    - cron: '45 14 * * *'   # 14:45 UTC daily

permissions:
  contents: write

concurrency:
  group: lix-precip-map
  cancel-in-progress: true

jobs:
  build-map:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate map
        env:
          SYNOPTIC_TOKEN: ${{ secrets.SYNOPTIC_TOKEN }}
        run: |
          python scripts/fetch_lix_precip.py

      - name: Commit updated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ data/
          git diff --cached --quiet && exit 0
          git commit -m "Update latest LIX precip map"
          git push
